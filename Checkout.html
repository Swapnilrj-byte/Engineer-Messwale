<!DOCTYPE html>
<html lang="en">
<head>

<title>Checkout - Engineer Messwale</title>

</head>

<body>

<header>
<h1>Engineer Messwale</h1>
</header>

<section class="menu">

<input type="text" placeholder="Full Name"><br><br>

<input type="tel" placeholder="Mobile Number"><br><br>

<option>Cash on Delivery</option>
<option>UPI Payment</option>
</select>

<br><br>

<button class="btn" onclick="placeOrder()">
    Place Order
</button>

</section>
<script>
function placeOrder() {
    alert("🎉 Thank you for ordering from Engineer Messwale!\n\nYour order has been placed successfully.");
}
</script>
</body>
