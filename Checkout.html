<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - Engineer Messwale</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Engineer Messwale</h1>
</header>

<section class="menu">

<h2>Checkout</h2>

<input type="text" id="name" placeholder="Full Name" required>

<input type="tel" id="phone" placeholder="Mobile Number" required>

<textarea id="address" placeholder="Delivery Address" required></textarea><br><br>

<select>
<option>Cash on Delivery</option>
<option>UPI Payment</option>
</select>

<br><br>

<button class="btn" onclick="placeOrder()">
    Place Order
</button>

</section>
<script>
function placeOrder() {

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    if (name === "" || phone === "" || address === "") {
        alert("Please fill all details.");
        return;
    }

    alert(
        "🎉 Order Confirmed!\n\n" +
        "Name: " + name +
        "\nPhone: " + phone +
        "\nAddress: " + address
    );
}
</script>
</body>
</html>
